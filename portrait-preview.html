<!DOCTYPE html>
<html>
<head><title>Portrait Test</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 40px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
.grid { display: flex; gap: 40px; }
.card { width: 200px; }
img { width: 200px; height: 200px; object-fit: cover; display: block; }
p { font-size: 11px; color: #5A5A56; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
strong { display: block; color: #F0EDE8; font-size: 16px; margin-top: 10px; }
span { font-size: 11px; color: #C9A84C; }
</style>
</head>
<body>
<h1>Invoker Portrait — v1 vs v2</h1>
<div class="grid">
  <div class="card">
    <img src="portrait-invoker.jpg">
    <strong>v1</strong>
    <span>Too dark</span>
  </div>
  <div class="card">
    <img src="portrait-invoker-v2.jpg">
    <strong>v2</strong>
    <span>Brighter lighting</span>
  </div>
</div>
</body>
</html>
