<!DOCTYPE html>
<html>
<head><title>Icon Test</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 40px; font-size: 20px; letter-spacing: 0.1em; }
.grid { display: flex; gap: 40px; flex-wrap: wrap; }
.item { text-align: center; }
img { width: 64px; height: 64px; display: block; margin-bottom: 8px; }
p { font-size: 12px; color: #5A5A56; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head>
<body>
<h1>Agent Icon Tests</h1>
<div class="grid">
  <div class="item"><img src="icon-invoker.jpg"><p>Invoker</p></div>
  <div class="item"><img src="icon-juggernaut.jpg"><p>Juggernaut</p></div>
</div>
</body>
</html>
