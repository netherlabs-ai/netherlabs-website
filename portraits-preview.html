<!DOCTYPE html>
<html>
<head><title>Agent Portraits</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 40px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 900px; }
.card { text-align: center; }
img { width: 120px; height: 120px; display: block; margin: 0 auto 8px; }
strong { display: block; font-size: 13px; color: #F0EDE8; }
span { font-size: 11px; color: #5A5A56; }
</style>
</head>
<body>
<h1>Agent Portraits — Geometric SVG</h1>
<div class="grid">
  <div class="card"><img src="portraits/portrait-invoker.svg"><strong>Invoker</strong><span>Chief of Staff</span></div>
  <div class="card"><img src="portraits/portrait-bane.svg"><strong>Bane</strong><span>CRO</span></div>
  <div class="card"><img src="portraits/portrait-keeper-of-the-light.svg"><strong>Keeper of the Light</strong><span>CFO</span></div>
  <div class="card"><img src="portraits/portrait-puck.svg"><strong>Puck</strong><span>CMO</span></div>
  <div class="card"><img src="portraits/portrait-silencer.svg"><strong>Silencer</strong><span>Legal</span></div>
  <div class="card"><img src="portraits/portrait-rubick.svg"><strong>Rubick</strong><span>Tax</span></div>
  <div class="card"><img src="portraits/portrait-ancient-apparition.svg"><strong>Ancient Apparition</strong><span>PM</span></div>
  <div class="card"><img src="portraits/portrait-enigma.svg"><strong>Enigma</strong><span>Quant</span></div>
  <div class="card"><img src="portraits/portrait-oracle.svg"><strong>Oracle</strong><span>Comptroller</span></div>
  <div class="card"><img src="portraits/portrait-disruptor.svg"><strong>Disruptor</strong><span>QA</span></div>
  <div class="card"><img src="portraits/portrait-tinker.svg"><strong>Tinker</strong><span>Engineer</span></div>
  <div class="card"><img src="portraits/portrait-lina.svg"><strong>Lina</strong><span>Designer</span></div>
  <div class="card"><img src="portraits/portrait-crystal-maiden.svg"><strong>Crystal Maiden</strong><span>Reporting</span></div>
  <div class="card"><img src="portraits/portrait-techies.svg"><strong>Techies</strong><span>Sysadmin</span></div>
  <div class="card"><img src="portraits/portrait-clockwerk.svg"><strong>Clockwerk</strong><span>Live Ops</span></div>

</html>
