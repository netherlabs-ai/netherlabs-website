<!DOCTYPE html>
<html>
<head><title>Invoker — Style Comparison</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 8px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
h2 { font-size: 28px; margin-bottom: 40px; font-weight: 300; }
.grid { display: flex; gap: 40px; flex-wrap: wrap; }
.card { width: 240px; }
img { width: 240px; height: 240px; object-fit: cover; display: block; }
strong { display: block; color: #C9A84C; font-size: 13px; margin-top: 14px; letter-spacing: 0.1em; text-transform: uppercase; }
p { font-size: 12px; color: #5A5A56; margin-top: 4px; }
.name { font-size: 18px; color: #F0EDE8; margin-top: 6px; font-weight: 500; }
.role { font-size: 11px; color: #5A5A56; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
<h1>Agent Portrait</h1>
<h2>Invoker — Chief of Staff</h2>
<div class="grid">
  <div class="card">
    <img src="invoker-ink.jpg">
    <strong>Style A</strong>
    <p>Ink / Brush — gestural, editorial</p>
    <div class="name">Invoker</div>
    <div class="role">Chief of Staff</div>
  </div>
  <div class="card">
    <img src="invoker-geometric.jpg">
    <strong>Style B</strong>
    <p>Geometric / Constructivist — abstract, precise</p>
    <div class="name">Invoker</div>
    <div class="role">Chief of Staff</div>
  </div>
  <div class="card">
    <img src="invoker-editorial.jpg">
    <strong>Style C</strong>
    <p>Editorial Portrait — Rembrandt, cinematic</p>
    <div class="name">Invoker</div>
    <div class="role">Chief of Staff</div>
  </div>
</div>
</body>
</html>
