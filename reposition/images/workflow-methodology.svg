<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five-step AI Workflow Audit methodology: Map, Score, Roadmap, Design, Build/Launch/Measure">
  <!-- design-system: design.md (v5) ported to Nether Labs reposition site, 2026-07-11 -->
  <!-- Background -->
  <rect width="1200" height="260" fill="#0d0d0d"/>

  <defs>
    <style>
      .step-circle { fill: #C9A84C; }
      .step-number { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 700; fill: #0d0d0d; text-anchor: middle; dominant-baseline: middle; }
      .step-label { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; fill: #ede9e3; text-anchor: middle; }
      .step-description { font-family: 'Inter', sans-serif; font-size: 12px; fill: #b0ada6; text-anchor: middle; }
      .connector-curve { stroke: #C9A84C; stroke-width: 2; fill: none; opacity: 0.4; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Connector curves -->
  <path class="connector-curve" d="M 145 110 Q 205 75 265 110" />
  <path class="connector-curve" d="M 385 110 Q 445 75 505 110" />
  <path class="connector-curve" d="M 625 110 Q 685 75 745 110" />
  <path class="connector-curve" d="M 865 110 Q 925 75 985 110" />

  <!-- Step 1: Map -->
  <circle cx="105" cy="110" r="38" class="step-circle"/>
  <text x="105" y="110" class="step-number">1</text>
  <text x="105" y="168" class="step-label">Map</text>
  <text x="105" y="188" class="step-description">Direct shadowing</text>

  <!-- Step 2: Score -->
  <circle cx="345" cy="110" r="38" class="step-circle"/>
  <text x="345" y="110" class="step-number">2</text>
  <text x="345" y="168" class="step-label">Score</text>
  <text x="345" y="188" class="step-description">Value, risk, SR&amp;ED</text>

  <!-- Step 3: Roadmap -->
  <circle cx="585" cy="110" r="38" class="step-circle"/>
  <text x="585" y="110" class="step-number">3</text>
  <text x="585" y="168" class="step-label">Roadmap</text>
  <text x="585" y="188" class="step-description">90-day plan</text>

  <!-- Step 4: Design -->
  <circle cx="825" cy="110" r="38" class="step-circle"/>
  <text x="825" y="110" class="step-number">4</text>
  <text x="825" y="168" class="step-label">Design</text>
  <text x="825" y="188" class="step-description">Human-AI workflow</text>

  <!-- Step 5: Build, launch, measure -->
  <circle cx="1065" cy="110" r="38" class="step-circle"/>
  <text x="1065" y="110" class="step-number">5</text>
  <text x="1065" y="168" class="step-label">Build &amp; Measure</text>
  <text x="1065" y="188" class="step-description">Ship, document, track</text>

  <!-- Accent line -->
  <line x1="0" y1="230" x2="1200" y2="230" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
</svg>
