<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Steward architecture diagram: hub-and-spokes model with Steward at the center coordinating purpose-built agent roles">
  <!-- design-system: design.md (v5) ported to Nether Labs reposition site, 2026-07-11 -->
  <!-- Redesigned 2026-07-11: labels moved outside circles for legibility -->
  <rect width="1000" height="760" fill="#0d0d0d"/>

  <defs>
    <style>
      .hub-circle { fill: #C9A84C; }
      .hub-ring { fill: none; stroke: #C9A84C; stroke-width: 1; }
      .spoke-circle { fill: #111111; stroke: #C9A84C; stroke-width: 1.5; }
      .hub-label { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 700; fill: #0d0d0d; text-anchor: middle; dominant-baseline: middle; }
      .spoke-name { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; fill: #ede9e3; }
      .spoke-role { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 500; fill: #82827e; letter-spacing: 0.07em; }
      .connection-line { stroke: rgba(201,168,76,0.22); stroke-width: 1.5; fill: none; stroke-dasharray: 5,4; }
      .grid-line { stroke: rgba(201,168,76,0.04); stroke-width: 1; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line"/>
    </pattern>
  </defs>

  <rect width="1000" height="760" fill="url(#grid)"/>

  <!-- Subtle outer rings on hub -->
  <circle cx="500" cy="390" r="88" class="hub-ring" opacity="0.25"/>
  <circle cx="500" cy="390" r="112" class="hub-ring" opacity="0.10"/>

  <!-- Connection lines: hub edge → spoke circle edge -->
  <!-- N: Orchestrator (500, 190) -->
  <line x1="500" y1="322" x2="500" y2="228" class="connection-line"/>
  <!-- NE: Risk Monitor (641, 249) -->
  <line x1="548" y1="342" x2="614" y2="276" class="connection-line"/>
  <!-- E: Alpha Engine (700, 390) -->
  <line x1="568" y1="390" x2="662" y2="390" class="connection-line"/>
  <!-- SE: Compliance (641, 531) -->
  <line x1="548" y1="438" x2="614" y2="504" class="connection-line"/>
  <!-- S: Live Ops (500, 590) -->
  <line x1="500" y1="458" x2="500" y2="552" class="connection-line"/>
  <!-- SW: Comptroller (359, 531) -->
  <line x1="452" y1="438" x2="386" y2="504" class="connection-line"/>
  <!-- W: Brand Strategy (300, 390) -->
  <line x1="432" y1="390" x2="338" y2="390" class="connection-line"/>
  <!-- NW: Systems Eng. (359, 249) -->
  <line x1="452" y1="342" x2="386" y2="276" class="connection-line"/>

  <!-- Hub -->
  <circle cx="500" cy="390" r="68" class="hub-circle"/>
  <text x="500" y="390" class="hub-label">Steward</text>

  <!-- ── SPOKE CIRCLES (r=38) at distance 200 from hub ── -->

  <!-- N: Orchestrator (500, 190) -->
  <circle cx="500" cy="190" r="38" class="spoke-circle"/>
  <text x="500" y="133" class="spoke-name" text-anchor="middle">Orchestrator</text>
  <text x="500" y="150" class="spoke-role" text-anchor="middle">COORDINATION</text>

  <!-- NE: Risk Monitor (641, 249) -->
  <circle cx="641" cy="249" r="38" class="spoke-circle"/>
  <text x="690" y="203" class="spoke-name" text-anchor="start">Risk Monitor</text>
  <text x="690" y="220" class="spoke-role" text-anchor="start">OVERSIGHT</text>

  <!-- E: Alpha Engine (700, 390) -->
  <circle cx="700" cy="390" r="38" class="spoke-circle"/>
  <text x="750" y="384" class="spoke-name" text-anchor="start">Alpha Engine</text>
  <text x="750" y="401" class="spoke-role" text-anchor="start">RESEARCH</text>

  <!-- SE: Compliance (641, 531) -->
  <circle cx="641" cy="531" r="38" class="spoke-circle"/>
  <text x="690" y="573" class="spoke-name" text-anchor="start">Compliance</text>
  <text x="690" y="590" class="spoke-role" text-anchor="start">LEGAL &amp; REG</text>

  <!-- S: Live Ops (500, 590) -->
  <circle cx="500" cy="590" r="38" class="spoke-circle"/>
  <text x="500" y="643" class="spoke-name" text-anchor="middle">Live Ops Monitor</text>
  <text x="500" y="660" class="spoke-role" text-anchor="middle">KILL SWITCH</text>

  <!-- SW: Comptroller (359, 531) -->
  <circle cx="359" cy="531" r="38" class="spoke-circle"/>
  <text x="310" y="573" class="spoke-name" text-anchor="end">Comptroller</text>
  <text x="310" y="590" class="spoke-role" text-anchor="end">FINANCE</text>

  <!-- W: Brand Strategy (300, 390) -->
  <circle cx="300" cy="390" r="38" class="spoke-circle"/>
  <text x="250" y="384" class="spoke-name" text-anchor="end">Brand Strategy</text>
  <text x="250" y="401" class="spoke-role" text-anchor="end">GROWTH</text>

  <!-- NW: Systems Engineering (359, 249) -->
  <circle cx="359" cy="249" r="38" class="spoke-circle"/>
  <text x="310" y="203" class="spoke-name" text-anchor="end">Systems Eng.</text>
  <text x="310" y="220" class="spoke-role" text-anchor="end">INFRASTRUCTURE</text>

  <!-- Legend -->
  <rect x="30" y="700" width="238" height="50" fill="rgba(17,17,17,0.85)" stroke="rgba(201,168,76,0.12)" stroke-width="1" rx="3"/>
  <circle cx="52" cy="716" r="8" class="hub-circle"/>
  <text x="70" y="720" class="spoke-name" text-anchor="start" style="font-size:11px;">Coordination Hub</text>
  <circle cx="52" cy="738" r="8" class="spoke-circle"/>
  <text x="70" y="742" class="spoke-name" text-anchor="start" style="font-size:11px;">Purpose-built Agent</text>
</svg>
