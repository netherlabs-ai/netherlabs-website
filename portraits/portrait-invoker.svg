<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A0A09"/>
  
  <!-- connecting lines -->
  <line x1="100" y1="52" x2="62" y2="128" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="52" x2="138" y2="128" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="128" x2="138" y2="128" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- orbit ring around each circle -->
  <circle cx="100" cy="52" r="26" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="62" cy="128" r="26" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="138" cy="128" r="26" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- orbs -->
  <circle cx="100" cy="52" r="18" fill="#C9A84C"/>
  <circle cx="62" cy="128" r="18" fill="#C9A84C"/>
  <circle cx="138" cy="128" r="18" fill="#C9A84C"/>
  <!-- small center dot -->
  <circle cx="100" cy="100" r="5" fill="#C9A84C" opacity="0.6"/>

</svg>