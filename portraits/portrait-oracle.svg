<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A0A09"/>
  
  <!-- eye outer shape -->
  <path d="M 24 100 Q 100 34 176 100 Q 100 166 24 100 Z" fill="#C9A84C"/>
  <!-- sclera (remove inner) -->
  <circle cx="100" cy="100" r="44" fill="#0A0A09"/>
  <!-- iris -->
  <circle cx="100" cy="100" r="34" fill="#C9A84C"/>
  <!-- pupil -->
  <circle cx="100" cy="100" r="16" fill="#0A0A09"/>
  <!-- pupil dot -->
  <circle cx="100" cy="100" r="6" fill="#C9A84C"/>
  <!-- eye corners -->
  <circle cx="24" cy="100" r="5" fill="#C9A84C"/>
  <circle cx="176" cy="100" r="5" fill="#C9A84C"/>

</svg>