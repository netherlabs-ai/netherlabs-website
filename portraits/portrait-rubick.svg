  <!-- spark lines -->
  <line x1="100" y1="22" x2="100" y2="14" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="26" x2="118" y2="20" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="26" x2="82" y2="20" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

