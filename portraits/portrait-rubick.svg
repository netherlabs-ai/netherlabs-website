<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A0A09"/>
  
  <!-- palm -->
  <rect x="68" y="112" width="64" height="52" rx="6" fill="#C9A84C"/>
  <!-- fingers: 4 rectangles -->
  <rect x="70" y="72" width="14" height="46" rx="5" fill="#C9A84C"/>
  <rect x="88" y="64" width="14" height="54" rx="5" fill="#C9A84C"/>
  <rect x="106" y="64" width="14" height="54" rx="5" fill="#C9A84C"/>
  <rect x="124" y="72" width="14" height="46" rx="5" fill="#C9A84C"/>
  <!-- thumb -->
  <rect x="44" y="112" width="28" height="14" rx="5" fill="#C9A84C"/>
  <!-- spark diamond above -->
