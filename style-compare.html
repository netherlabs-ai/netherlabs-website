<!DOCTYPE html>
<html>
<head><title>Style Comparison</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 40px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
.grid { display: flex; gap: 32px; flex-wrap: wrap; }
.card { width: 220px; }
img { width: 220px; height: 220px; object-fit: cover; display: block; }
strong { display: block; color: #F0EDE8; font-size: 15px; margin-top: 12px; }
p { font-size: 11px; color: #5A5A56; margin-top: 4px; letter-spacing: 0.06em; }
</style>
</head>
<body>
<h1>Portrait Style Options — Pick One</h1>
<div class="grid">
  <div class="card">
    <img src="style-ink.jpg">
    <strong>A — Ink / Brush</strong>
    <p>Japanese woodblock meets luxury brand</p>
  </div>
  <div class="card">
    <img src="style-geometric.jpg">
    <strong>B — Geometric</strong>
    <p>Constructivist, gold polygons, abstract face</p>
  </div>
  <div class="card">
    <img src="style-editorial.jpg">
    <strong>C — Editorial Photo</strong>
    <p>Rembrandt lighting, magazine quality</p>
  </div>
</div>
</body>
</html>
