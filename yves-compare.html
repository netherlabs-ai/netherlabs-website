<!DOCTYPE html>
<html>
<head><title>Yves Photo Options</title>
<style>
body { background: #0A0A09; color: #F0EDE8; font-family: Inter, sans-serif; padding: 40px; }
h1 { color: #C9A84C; margin-bottom: 40px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
.grid { display: flex; gap: 40px; }
.card { width: 280px; }
img { width: 280px; height: 280px; object-fit: cover; display: block; }
strong { display: block; color: #F0EDE8; font-size: 15px; margin-top: 12px; }
p { font-size: 11px; color: #5A5A56; margin-top: 4px; }
</style>
</head>
<body>
<h1>Founder Photo — Original vs Branded</h1>
<div class="grid">
  <div class="card">
    <img src="yves-original.jpg">
    <strong>Original</strong>
    <p>Your existing X profile photo</p>
  </div>
  <div class="card">
    <img src="yves-branded.jpg">
    <strong>Branded</strong>
    <p>Dark studio, gold lighting, Nether Labs aesthetic</p>
  </div>
</div>
</body>
</html>
